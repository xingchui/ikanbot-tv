name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -la /usr/local/lib/android/sdk/ 2>/dev/null || echo "SDK not found at default path"
          echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties
          cat local.properties

      - name: Make wrapper executable
        run: chmod +x gradlew

      - name: Build Debug APK
        shell: bash
        run: |
          set +e
          ./gradlew assembleDebug --no-daemon --stacktrace > build-output.log 2>&1
          EXIT_CODE=$?
          echo "GRADLE_EXIT_CODE=$EXIT_CODE" >> build-output.log
          echo "Build exit code: $EXIT_CODE"
          cat build-output.log
          exit $EXIT_CODE

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build-output.log
          retention-days: 7

      - name: Upload APK artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apk-files
          path: app/build/outputs/apk/
          retention-days: 30
